version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: echo "Installing dependencies..."
      - run:
          name: Run tests
          command: echo "Running tests..." && exit 0

  test-failure:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Flaky network test
          command: echo "Simulating flaky test..." && exit 1

workflows:
  main:
    jobs:
      - build
      - test-failure